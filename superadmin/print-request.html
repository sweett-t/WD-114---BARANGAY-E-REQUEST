<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Print Request | Barangay E-Request</title>
  <style>
    :root {
      --primary: #2563eb; --primary-light: #dbeafe;
      --gray-100: #f1f5f9; --gray-200: #e5e7eb; --gray-400: #94a3b8;
      --gray-500: #64748b; --gray-700: #374151; --gray-900: #1e293b;
      --success: #065f46; --success-light: #d1fae5;
      --danger: #991b1b; --danger-light: #fee2e2;
      --warning-light: #fef3c7; --warning: #92400e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: var(--gray-100); min-height: 100vh; }

    /* Top bar (hidden on print) */
    .topbar {
      background: #fff; border-bottom: 1px solid var(--gray-200);
      padding: 0.85rem 2rem; display: flex; align-items: center;
      justify-content: space-between; gap: 1rem;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 1rem; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.4rem 0.85rem; border-radius: 0.375rem; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; background: var(--gray-100);
      color: var(--gray-700); border: 1.5px solid var(--gray-200);
      text-decoration: none;
    }
    .back-btn:hover { background: var(--gray-200); }
    .topbar-title { font-weight: 700; font-size: 1rem; color: var(--gray-900); }
    .topbar-actions { display: flex; gap: 0.75rem; }
    .btn-print-now {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.5rem 1.25rem; border-radius: 0.375rem; font-size: 0.875rem;
      font-weight: 700; cursor: pointer; background: var(--primary);
      color: #fff; border: none;
    }
    .btn-print-now:hover { background: #1d4ed8; }
    .btn-print-now svg { width: 16px; height: 16px; }

    /* Preview wrapper */
    .preview-wrapper {
      max-width: 800px; margin: 2rem auto; padding: 0 1.5rem 3rem;
    }
    .preview-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--gray-400); margin-bottom: 0.75rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .preview-label::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }

    /* Document paper */
    .document {
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 0.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 3rem;
      position: relative;
    }

    /* Watermark */
    .watermark {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; pointer-events: none; opacity: 0.04;
      font-size: 5rem; font-weight: 900; color: var(--primary);
      text-transform: uppercase; letter-spacing: 0.5rem;
      transform: rotate(-30deg);
    }

    /* Document header */
    .doc-header { text-align: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--gray-200); }
    .doc-header .republic { font-size: 0.78rem; color: var(--gray-500); letter-spacing: 0.5px; margin-bottom: 0.25rem; }
    .doc-header .lgu { font-size: 0.85rem; font-weight: 600; color: var(--gray-700); }
    .doc-header .barangay { font-size: 1.4rem; font-weight: 800; color: var(--gray-900); margin: 0.25rem 0; }
    .doc-header .address { font-size: 0.78rem; color: var(--gray-500); }
    .doc-header .doc-title {
      margin-top: 1.5rem; font-size: 1.1rem; font-weight: 800;
      color: var(--primary); text-transform: uppercase; letter-spacing: 1px;
      padding: 0.4rem 1.5rem; border: 2px solid var(--primary);
      display: inline-block; border-radius: 0.25rem;
    }

    /* Status banner */
    .status-banner {
      padding: 0.6rem 1rem; border-radius: 0.375rem; margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; font-weight: 700;
    }
    .status-approved { background: var(--success-light); color: var(--success); }
    .status-released { background: var(--primary-light); color: var(--primary); }
    .status-pending { background: var(--warning-light); color: var(--warning); }
    .status-rejected { background: var(--danger-light); color: var(--danger); }

    /* Control number */
    .control-row {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem;
    }
    .control-box { 
    .control-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--gray-400); }
    .control-value { font-size: 0.95rem; font-weight: 700; color: var(--gray-900); font-family: monospace; }
    .date-filed { text-align: right; }
    }
    /* Section */
    .doc-section { margin-bottom: 1.5rem; }
    .section-title {
      font-size: 0.72rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--primary); margin-bottom: 0.75rem;
      padding-bottom: 0.35rem; border-bottom: 1.5px solid var(--primary-light);
    }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem 1.5rem; }
    .info-row { 
    .info-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; color: var(--gray-400); margin-bottom: 0.15rem; }
    .info-value { font-size: 0.875rem; color: var(--gray-900); font-weight: 500; border-bottom: 1px solid var(--gray-200); padding-bottom: 0.25rem; }
    .info-value.empty { color: var(--gray-400); font-style: italic; }
    .full-width { grid-column: 1 / -1; }
    }
    /* Badge */
    .inline-badge {
      display: inline-flex; padding: 0.15rem 0.65rem; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 700;
    }

    /* Signatures */
    .sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 2rem; }
    .sig-box { text-align: center; }
    .sig-line { border-top: 1.5px solid var(--gray-900); margin: 2.5rem 0 0.35rem; }
    .sig-name { font-size: 0.85rem; font-weight: 700; color: var(--gray-900); }
    .sig-role { font-size: 0.72rem; color: var(--gray-500); }

    /* Footer note */
    .doc-note {
      margin-top: 2rem; padding-top: 1rem; border-top: 1px dashed var(--gray-200);
      font-size: 0.72rem; color: var(--gray-400); text-align: center; line-height: 1.6;
    }

    /* Loading / error */
    .state-msg { text-align: center; padding: 3rem; color: var(--gray-400); font-size: 0.95rem; }

    /* ── PRINT STYLES ── */
    @media print {
      .topbar, .preview-label { display: none !important; }
      body { background: #fff; }
      .preview-wrapper { margin: 0; padding: 0; max-width: 100%; }
      .document { border: none; border-radius: 0; box-shadow: none; padding: 1.5cm; }
      .status-banner { border: 1px solid currentColor; }
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar" id="topbar">
    <div class="topbar-left">
      <a href="../superadmin/superadmin-requests.html" class="back-btn">
        ← Back
      </a>
      <span class="topbar-title">Print Preview</span>
    </div>
    <div class="topbar-actions">
      <button class="btn-print-now" onclick="window.print()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Print
      </button>
    </div>
  </div>

  <div class="preview-wrapper">
    <div class="preview-label">Document Preview</div>
    <div class="document" id="doc">
      <div class="state-msg" id="loadingMsg">Loading request details...</div>
    </div>
  </div>

  <script src="../js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Get request ID from URL param
      const params = new URLSearchParams(window.location.search);
      const reqId = params.get('id');

      if (!reqId) {
        document.getElementById('doc').innerHTML = '<div class="state-msg">No request ID provided. Please go back and try again.</div>';
        return;
      }

      const requests = getData(STORAGE_KEYS.REQUESTS) || [];
      const req = requests.find(r => r.id === reqId);

      if (!req) {
        document.getElementById('doc').innerHTML = '<div class="state-msg">Request not found. It may have been deleted.</div>';
        return;
      }

      const users = getData(STORAGE_KEYS.USERS) || [];
      const user = users.find(u => u.id === req.userId);

      function displayName(u) {
        if (!u) return req.requesterName || 'Unknown';
        if (u.lastName) return [u.lastName + ',', u.firstName, u.middleName].filter(Boolean).join(' ');
        return u.fullName || u.name || 'Unknown';
      }

      function fmt(d) { return d ? new Date(d).toLocaleDateString('en-PH', { year: 'numeric', month: 'long', day: 'numeric' }) : '-'; }
      function fmtDT(d) { return d ? new Date(d).toLocaleString('en-PH', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '-'; }
      function val(v) { return v || '<span class="empty">—</span>'; }

      const statusClass = {
        approved: 'status-approved', released: 'status-released',
        pending: 'status-pending', rejected: 'status-rejected'
      }[req.status] || 'status-pending';

      const statusLabel = {
        approved: '✓ APPROVED — Ready for pickup',
        released: '✓ RELEASED — Document has been claimed',
        pending: '⏳ PENDING — Awaiting processing',
        rejected: '✗ REJECTED'
      }[req.status] || req.status.toUpperCase();

      const name = displayName(user);
      const controlNo = (req.id || '').toUpperCase();

      document.getElementById('doc').innerHTML = `
        <div class="watermark">Barangay</div>

        <div class="doc-header">
          <div class="republic">Republic of the Philippines</div>
          <div class="lgu">City / Municipality of Zamboanga City</div>
          <div class="barangay">Barangay Lunzuran</div>
          <div class="address">Zamboanga del Sur, Zamboanga Peninsula, Region IX</div>
          <div class="doc-title">${req.type || 'Document Request'}</div>
        </div>

        <div class="status-banner ${statusClass}">${statusLabel}</div>

        <div class="control-row">
          <div class="control-box">
            <div class="control-label">Control Number</div>
            <div class="control-value">${controlNo}</div>
          </div>
          <div class="date-filed control-box">
            <div class="control-label">Date Filed</div>
            <div class="control-value">${fmt(req.createdAt)}</div>
          </div>
        </div>

        <div class="doc-section">
          <div class="section-title">Applicant Information</div>
          <div class="info-grid">
            <div class="info-row full-width">
              <div class="info-label">Full Name</div>
              <div class="info-value">${val(name)}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Contact Number</div>
              <div class="info-value">${val(req.requesterPhone || user?.phone)}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Email Address</div>
              <div class="info-value">${val(req.requesterEmail || user?.email)}</div>
            </div>
            <div class="info-row full-width">
              <div class="info-label">Address</div>
              <div class="info-value">${val(req.requesterAddress)}</div>
            </div>
          </div>
        </div>

        <div class="doc-section">
          <div class="section-title">Request Details</div>
          <div class="info-grid">
            <div class="info-row">
              <div class="info-label">Document Type</div>
              <div class="info-value">${val(req.type)}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Purpose</div>
              <div class="info-value">${val(req.purpose)}</div>
            </div>
            ${req.businessName ? `
            <div class="info-row">
              <div class="info-label">Business Name</div>
              <div class="info-value">${req.businessName}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Business Type</div>
              <div class="info-value">${val(req.businessType)}</div>
            </div>` : ''}
            ${req.incomeRange ? `
            <div class="info-row">
              <div class="info-label">Income Range</div>
              <div class="info-value">${req.incomeRange}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Employment Status</div>
              <div class="info-value">${val(req.employmentStatus)}</div>
            </div>` : ''}
            ${req.lengthOfStay ? `
            <div class="info-row">
              <div class="info-label">Length of Stay</div>
              <div class="info-value">${req.lengthOfStay}</div>
            </div>` : ''}
            ${req.yearsOfResidency ? `
            <div class="info-row">
              <div class="info-label">Years of Residency</div>
              <div class="info-value">${req.yearsOfResidency}</div>
            </div>` : ''}
            ${req.numDependents ? `
            <div class="info-row">
              <div class="info-label">Number of Dependents</div>
              <div class="info-value">${req.numDependents}</div>
            </div>` : ''}
            <div class="info-row">
              <div class="info-label">Service Fee</div>
              <div class="info-value">${req.fee === 0 ? 'FREE' : '₱' + (req.fee || 0).toFixed(2)}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Payment Method</div>
              <div class="info-value">${val(req.paymentMethod)}</div>
            </div>
            ${req.notes ? `
            <div class="info-row full-width">
              <div class="info-label">Notes</div>
              <div class="info-value">${req.notes}</div>
            </div>` : ''}
          </div>
        </div>

        <div class="doc-section">
          <div class="section-title">Processing Information</div>
          <div class="info-grid">
            <div class="info-row">
              <div class="info-label">Status</div>
              <div class="info-value">
                <span class="inline-badge ${statusClass}">${(req.status || '').toUpperCase()}</span>
              </div>
            </div>
            <div class="info-row">
              <div class="info-label">Date Filed</div>
              <div class="info-value">${fmtDT(req.createdAt)}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Approved By</div>
              <div class="info-value">${val(req.approvedBy)}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Date Approved</div>
              <div class="info-value">${fmtDT(req.approvedAt)}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Released By</div>
              <div class="info-value">${val(req.releasedBy)}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Date Released</div>
              <div class="info-value">${fmtDT(req.releasedAt)}</div>
            </div>
            ${req.rejectedBy ? `
            <div class="info-row">
              <div class="info-label">Rejected By</div>
              <div class="info-value">${req.rejectedBy}</div>
            </div>
            <div class="info-row">
              <div class="info-label">Rejection Reason</div>
              <div class="info-value">${val(req.rejectionReason)}</div>
            </div>` : ''}
          </div>
        </div>

        <div class="sig-grid">
          <div class="sig-box">
            <div class="sig-line"></div>
            <div class="sig-name">${name}</div>
            <div class="sig-role">Applicant's Signature over Printed Name</div>
          </div>
          <div class="sig-box">
            <div class="sig-line"></div>
            <div class="sig-name">${val(req.approvedBy || req.releasedBy)}</div>
            <div class="sig-role">Authorized Barangay Official</div>
          </div>
        </div>

        <div class="doc-note">
          This document is computer-generated and is valid only with the official barangay seal and signature.<br/>
          For verification, present this document at the Barangay Hall of Lunzuran, Zamboanga City.<br/>
          Control No: <strong>${controlNo}</strong> — Generated: ${fmtDT(new Date().toISOString())}
        </div>
      `;
    });
  </script>
</body>
</html>
