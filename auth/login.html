
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay E‑Request Login</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth-login.css">
</head>

<body>

<div class="auth-layout">

    <div class="auth-hero">
        <div class="hero-content">
            <h1>Barangay E‑Request</h1>
            <h2>Request documents anytime, anywhere.</h2>
            <p>
                Access barangay services online without long queues.
                Submit and track your requests directly from home.
            </p>
        </div>
    </div>

    <div class="auth-form-area">
        <div class="login-container card">

            <h2>Welcome back</h2>
            <p class="login-subtext">Sign in to your account to continue.</p>

            <form action="#" method="post" autocomplete="on">

                <div class="input-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" autocomplete="username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn btn-primary" aria-label="Login to your account">Login</button>

                <p class="signup-link">
                    Don't have an account?
                    <a href="signup.html">Create an account</a>
                </p>

            </form>

        </div>
    </div>

</div>

</body>
 </html>
